# ============================================================
# Eskişehir Event API - Production Configuration
# ============================================================
# Uses PostgreSQL. Activate with: --spring.profiles.active=prod
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/eskisehir_events
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.eskisehir.eventapi=INFO
